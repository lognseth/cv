name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: pages-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mikael.cv
    steps:
      - uses: actions/checkout@v4
      - name: Refuse placeholder content
        run: |
          if grep -R -E "REPLACE_ME|Replace this|20XX|Project name|Technology|Skill or discipline" site; then
            echo "The résumé still contains placeholder content."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy site --project-name=mikael-cv --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

